name: test_msec
model_type: FTModel2
scale: 1
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1: # the 1st test dataset
    name: ME
    type: PairedOneToManyBilateralDataset
    dataroot_gt: datasets/msec/test/expert_c_testing_set
    dataroot_lq: datasets/msec/test/INPUT_IMAGES
    io_backend:
      type: disk

# network structures
network_g:
  type: CoNet
  n_vertices_3d: 17
  input_resolution: 256

# path
path:
  pretrain_network_g: pretrained/msec_net.pth
  param_key_g: params_ema
  strict_load_g: true

val:
  save_img: true
  suffix: ~ # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
